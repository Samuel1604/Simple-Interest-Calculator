<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Interest Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <form action="">
        <label for="principal"> Principal Amount </label>
        <input type="number" required name="principal" id="principal" />
        <label for="rate"> Annual Interest Rate </label>
        <input type="number" required name="rate" id="rate" />
        <label for="time"> Year </label>
        <input type="number" required name="time" id="time" />
        <button type="button" id="trigger">Calculate Interest</button>
      </form>
    </main>
  </body>
  <script src="script.js"></script>
</html>
